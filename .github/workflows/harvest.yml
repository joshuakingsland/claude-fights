name: Plan Historical Odds Backfill

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  plan:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12.13"
          cache: pip
      - run: python -m pip install -r requirements.txt
      - name: Show pending requests without spending credits
        run: python historical_odds.py --dry-run

