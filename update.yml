name: Update Fight Ledger
on:
  schedule:
    - cron: "0 14 * * 0,1,3"  # Sun & Mon (results) + Wed (early-line snapshot)
  workflow_dispatch:          # manual "Run workflow" button

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install -r requirements.txt
      - name: Refresh fight results
        run: python update_data.py
      - name: Fetch upcoming odds
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: python fetch_odds.py
      - name: Predict card & build site
        run: python predict_card.py
      - name: Commit site
        run: |
          git config user.name "fight-ledger-bot"
          git config user.email "actions@github.com"
          git add docs/ fights_v2.csv odds_upcoming.csv odds_log.csv
          git diff --cached --quiet || git commit -m "auto-update $(date -u +%F)"
          git push
